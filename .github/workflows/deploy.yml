name: Deploy (Cloudflare Pages)

# jakejoyner.com is a static site (no build step) deployed to a Cloudflare
# PAGES project named `homepage`. We stage a clean copy of the repo (dropping
# repo-only files) and ship it with wrangler:
#   pull request  -> Pages PREVIEW deploy (preview URL shown in the run log)
#   push to main  -> Pages PRODUCTION deploy (serves jakejoyner.com once the
#                    custom domain is attached to the Pages project)
#
# Requires repo secrets:
#   CLOUDFLARE_API_TOKEN   token with "Cloudflare Pages: Edit" on the account
#   CLOUDFLARE_ACCOUNT_ID  already set
# The Pages project's Git integration must stay DISCONNECTED so it never races
# this workflow. Optional PUSHOVER_TOKEN/USER secrets -> ping when main fails.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  # Per-ref: a PR preview never cancels an in-flight main deploy; repeated
  # pushes to the same ref serialize. PR runs may cancel their own older runs.
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Mapped here (not in `if:`) because the secrets context isn't available
      # in step conditions; empty when unset keeps the notify step dormant.
      PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
      PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
    steps:
      - uses: actions/checkout@v4

      # Static site: no build. Stage a clean copy so repo-only files (.git,
      # .claude worktrees, the old Workers config) are never published.
      - name: Stage site files
        run: |
          mkdir -p dist
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='.wrangler' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='nginx.conf' \
            --exclude='wrangler.jsonc' \
            --exclude='.assetsignore' \
            --exclude='.gitignore' \
            ./ dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          # wrangler-action defaults to v3.90; pin v4 to match the rest of the
          # toolchain and avoid envs/Pages quirks.
          wranglerVersion: '4.95.0'
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # PR -> preview (branch alias = the PR's head branch); main -> production.
          command: >-
            pages deploy dist
            --project-name=homepage
            --branch=${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}

      - name: Notify on failure (Pushover)
        if: ${{ failure() && github.event_name != 'pull_request' && env.PUSHOVER_TOKEN != '' && env.PUSHOVER_USER != '' }}
        run: |
          curl -s --max-time 20 \
            --form-string "token=$PUSHOVER_TOKEN" \
            --form-string "user=$PUSHOVER_USER" \
            --form-string "title=homepage deploy failed" \
            --form-string "message=Pages deploy failed on main (run ${{ github.run_id }}): https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            https://api.pushover.net/1/messages.json
