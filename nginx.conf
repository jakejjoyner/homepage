server {
    listen 0.0.0.0:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # HTML — always revalidate. Browsers + Cloudflare check for updates on
    # every request, so a fresh deploy is visible immediately without
    # forcing a hard-refresh on every visitor.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Static assets — fingerprinted-or-rare-change content. 30d is fine
    # (hard-refresh still busts; or rename the file for a strong purge).
    location ~* \.(css|js|ico|png|jpg|jpeg|svg|webp|woff2?|mp4|mov|webm)$ {
        expires 30d;
        add_header Cache-Control "public, must-revalidate" always;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
